# ---------------------------------------------------------------------------
# 2. SPECIAL RULES
# ---------------------------------------------------------------------------
# Applied BEFORE normal keyword matching. Referenced by ticket-triage/SKILL.md
# Step 3 and 010-ticket-registry.mdc.
# ---------------------------------------------------------------------------
special_rules:

  security_escalation:
    trigger_keywords:
      - breach
      - vulnerability
      - CVE
      - unauthorized access
      - data leak
      - credential exposure
      - secret exposed
      - security incident
    action: "IMMEDIATE_ESCALATE"
    escalate_to: "Security Team"
    skip_normal_triage: true
    notify:
      - "security-oncall@abacusinsights.com"
    note: >
      Security incidents bypass normal triage — escalate immediately
      to Security Team and OpsGenie.

  p0_fast_track:
    trigger_keywords:
      - production down
      - prod down
      - outage
      - P0
      - Sev1
      - SEV-1
      - complete failure
      - data loss
      - service unavailable
    action: "FAST_TRACK"
    skip_validation: false
    auto_priority: "P0 - Critical"
    auto_sla:
      response_time: "15 minutes"
      resolution_time: "4 hours"
    note: >
      P0 tickets get fast-tracked past normal queue. Validation still
      runs but is expedited.

  compliance_flag:
    trigger_keywords:
      - HIPAA
      - PHI
      - PII
      - FedRAMP
      - SOC2
      - audit
      - compliance
    action: "FLAG_COMPLIANCE"
    add_label: "compliance-review"
    note: >
      Compliance-flagged tickets get additional review step and
      restricted visibility.

# ---------------------------------------------------------------------------
# 3. PRIORITY RESOLUTION ORDER
# ---------------------------------------------------------------------------
# When multiple signals exist, this defines the precedence.
# Referenced by 010-ticket-registry.mdc.
# ---------------------------------------------------------------------------
priority_resolution:
  order:
    - explicit_ticket_type    # Jira priority field already set
    - label_based             # Jira labels match a known ticket type
    - keyword_based           # Title/description keyword matching
  fallback: "P3 - Low"
  ambiguity_action: "prompt_user"
  note: |
    If explicit_ticket_type is set (e.g., user selected "P1 - High"), honor it.
    If only labels are present, match labels to tickets_registry[*].type.
    If neither, fall back to keyword matching against tickets_registry[*].keywords.
    If nothing matches, assign P3 - Low and prompt for clarification.
