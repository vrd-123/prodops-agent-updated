  - title: "Introduction to AIR"
    url: "https://abacusinsights.atlassian.net/wiki/spaces/ES/pages/4594466845"
    description: "Overview of Abacus Insights Runtime architecture, components, and deployment model."
  - title: "AIR CD User Guide"
    url: "https://abacusinsights.atlassian.net/wiki/spaces/EA/pages/3125903361"
    description: "Continuous deployment guide for AIR including version management and rollback procedures."
  - title: "PipeSpec in NextGen"
    url: "https://abacusinsights.atlassian.net/wiki/spaces/ES/pages/4500586501"
    description: "PipeSpec YAML schema, stage definitions, and configuration reference."
  - title: "Troubleshooting Cluster Creation Failures"
    url: "https://abacusinsights.atlassian.net/wiki/spaces/ES/pages/5629804551"
    description: "Common cluster creation failure modes: quota limits, IAM issues, subnet exhaustion, and fixes."

repository:
  url: "https://gitlab.com/abacus-insights/ng-abacus-insights-runtime"
  branch_pattern: "feature/*"
  base_branch: "develop"
