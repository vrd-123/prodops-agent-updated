# ============================================================================
# Knowledge Expansion — Global Fallback Configuration
# ============================================================================
# Path: config/knowledge_expansion.yaml
#
# Read by: main agent (agent.md), solution-lookup/SKILL.md,
#          020-orchestration-hooks.mdc
#
# Purpose: When NO service-specific ticket-rules YAML matches the ticket
#          keywords, this file provides broad operational knowledge, SOPs,
#          troubleshooting guides, and escalation paths as a safety net.
#
# Design:
#   - Service-specific links live in config/ticket-rules/<type>.yaml
#   - This file = default knowledge when no service matches
#   - Fallback sections are loaded in section_priority order
#   - The prodops bot ONLY comments on tickets — no code changes
# ============================================================================

trigger_when: >
  Main agent needs more context for a JIRA ticket, project, or subject.
  Use ticket-rules knowledge_links first, then this config for defaults.

# ---------------------------------------------------------------------------
# Confluence Defaults
# ---------------------------------------------------------------------------
confluence:
  preferred_spaces:
    - Abacus NextGen 2.0

  # -------------------------------------------------------------------------
  # Fallback Knowledge Links — organized by section
  # Loaded by priority when no ticket-rules YAML matches
  # -------------------------------------------------------------------------
  fallback_knowledge_links:

    # ── Section 1: Standard Operating Procedures ──────────────────────────
    general_operations:
      title: "ProdOps Standard Operating Procedures & Process"
      links:
        - title: "PRODOPS Standard Operating Procedure (SOP)"
          url: "https://abacusinsights.atlassian.net/wiki/spaces/EA/pages/5475270668/PRODOPS+Standard+Operating+Procedure"
          description: >
            Ticket review SLA, validation process, severity classification,
            escalation, handoff, and closure standards.

        - title: "How to File an Issue in NextGen"
          url: "https://abacusinsights.atlassian.net/servicedesk/customer/portal/7/article/3290759170"
          description: >
            Guidelines for creating complete, actionable PRODOPS tickets.

        - title: "ProdOps Issue Categorization"
          url: "https://abacusinsights.atlassian.net/servicedesk/customer/portal/7/article/5432508442"
          description: >
            10 standard categories: Code, Config, Infra, Data Movement,
            Integration, Monitoring, Access, Enhancement, Not an Issue, Other.

        - title: "ProdOps Self-Service Station"
