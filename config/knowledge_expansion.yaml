# ---------------------------------------------------------------------------
# Fallback Behavior Configuration
# ---------------------------------------------------------------------------
fallback_behavior:
  attempt_closest_match: true
  max_links_to_load: 10
  section_priority:
    - troubleshooting
    - general_operations
    - escalation
    - platform_knowledge
    - data_operations
    - environment_context
    - bot_validation
  confidence_threshold: 0.4
  agent_prompt: |
    You are in FALLBACK MODE — no specific ticket-rules file matched
    this ticket's keywords.

    Before investigating:
    1. Check if the ticket mentions any environment, client, or
       component that might narrow the search. Re-check keyword
       matching with relaxed criteria.
    2. Use the ProdOps Troubleshooting Guide and Symptom Index to
       find similar past incidents.
    3. Follow the PRODOPS SOP for ticket validation — ensure all
       required information is present before proceeding.
    4. If the ticket clearly belongs to a specific team
       (Transporters, InterOp, Platform, DataOps), escalate using
       the InterOp-SWAT framework.
    5. Document your investigation steps in the ticket comments.

    NEVER guess the repository. If you cannot determine the correct
    repo, recommend manual triage by the SWAT on-call engineer.
