# ============================================================================
# ProdOps Phase 2 — Environment Configuration (v2.2)
# ============================================================================
# Maps Customer → AWS SSO profile + EKS cluster.
#
# S3 URIs (with account_id) are ALWAYS extracted from the ticket description.
# This config only provides the AWS/EKS infra needed to run commands.
#
# v2.2: Added known_path_patterns for cross-reference validation.
# ============================================================================

customers:
  BCI:
    customer_tag: bcidaho
    aws_profile: bcidaho
    region: us-east-1
    eks_cluster: bcidaho

  BlueKC:
    customer_tag: bluekc
    aws_profile: bluekc
    region: us-east-1
    eks_cluster: bluekc

  Medstar:
    customer_tag: medstar
    aws_profile: medstar
    region: us-east-1
    eks_cluster: medstar

  Gainwell:
    customer_tag: gainwell
    aws_profile: gainwell-nxgen
    region: us-east-1
    eks_cluster: gainwell

  Cambia:
    customer_tag: cambia
    aws_profile: cambia
    region: us-east-1
    eks_cluster: cambia
    onshore_only: true

  PHP:
    customer_tag: php
    aws_profile: ng-php
    region: us-east-1
    eks_cluster: php

  BCBSMA:
    customer_tag: bcbsma
    aws_profile: bcbsma
    region: us-east-1
    eks_cluster: bcbsma

  BCBSNC:
    customer_tag: bcbsnc
    aws_profile: bcbsnc
    region: us-east-1
    eks_cluster: bcbsnc

  Clover:
    customer_tag: clover
    aws_profile: clover
    region: us-east-1
    eks_cluster: clover

# ============================================================================
# Break-glass pod constants
# ============================================================================
break_glass:
  namespace: break-glass
  service_account: break-glass
  image: amazon/aws-cli:latest
  restart_policy: Never

# ============================================================================
# FHIR cleanup constants
# ============================================================================
fhir_cleanup:
  script_name: fhir_cleanup.py
  config_name: fhir_environments.yaml
  mongo_namespace: onyx-mongodb

# ============================================================================
# Customer alias mapping
# ============================================================================
customer_aliases:
  bcidaho: BCI
  "blue cross idaho": BCI
  bluekc: BlueKC
  "blue cross kansas city": BlueKC
  medstar: Medstar
  gainwell: Gainwell
  cambia: Cambia
  php: PHP
  "presbyterian health plan": PHP
  bcbsma: BCBSMA
  bcbsnc: BCBSNC
  clover: Clover

# ============================================================================
# Known path patterns (v2.2)
# ============================================================================
# Confirmed from historical ticket analysis.
# When the parser detects a "mismatch" that matches a known pattern,
# it downgrades the warning from ⚠️ to ℹ️ (informational).
#
# Evidence tickets are listed so the bot can cite them for confidence.
# ============================================================================
known_path_patterns:
  bluekc:
    # BlueKC dev bucket ALWAYS uses 'bluekc-stg' as the folder path.
    # This looks like a path/bucket mismatch but is intentional.
    # Confirmed across ALL BlueKC dev-destination tickets:
    #   PRODOPS-3417, 3415, 3307, 3211, 3185, 3171
    dev_uses_stg_folder: true
    dev_folder: "bluekc-stg"
    confirmed_tickets: "PRODOPS-3417, 3415, 3307, 3211, 3185, 3171"
